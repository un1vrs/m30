<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ライブグッズ合計計算</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: "Helvetica Neue", sans-serif;
      margin: 0;
      background: #f5f7f8;
      color: #333;
    }

    header {
      background: #7fc1c7;
      color: white;
      padding: 16px;
      text-align: center;
      font-size: 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
      background: #ddd;
    }

    .name {
      font-size: 13px;
      margin: 6px 0 2px;
    }

    .price {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    select {
      width: 100%;
      padding: 6px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 4px;
    }

    input[type="checkbox"] {
      transform: scale(1.3);
    }

    label {
      font-size: 13px;
    }

    .total {
      position: sticky;
      bottom: 0;
      background: white;
      padding: 12px;
      font-size: 18px;
      text-align: right;
      border-top: 2px solid #eee;
    }

    @media (max-width: 480px) {
      header { font-size: 18px; }
      .name { font-size: 12px; }
      .price { font-size: 11px; }
    }
  </style>
</head>

<body>

<header>M30 OFFICIAL GOODS</header>

<div class="container">
  <div class="grid" id="items"></div>
  <div class="total">合計: ¥<span id="total">0</span></div>
</div>

<script>
const goods = [
  { name: "Tシャツ黒（星落光）", price: 4200, img: "01.jpg", size: true },
  { name: "Tシャツ黒（星ホワイト）", price: 3800, img: "02.jpg", size: true },
  { name: "フェイスタオル", price: 2500, img: "03.jpg" },
  { name: "キャップ", price: 4000, img: "04.jpg" },
  { name: "Tシャツ白（星クリーム）", price: 3800, img: "05.jpg", size: true },
  { name: "Tシャツ白（星ブルーレッド）", price: 4200, img: "06.jpg", size: true },
  { name: "Tシャツ白（星ミントパープル）", price: 4200, img: "07.jpg", size: true },
  { name: "ライトパーカー", price: 7500, img: "08.jpg", size: true },
  { name: "バッグ", price: 2500, img: "09.jpg" },
  { name: "サーモボトル", price: 4500, img: "10.jpg" },
  { name: "ラバーキーホルダー白", price: 1800, img: "11.jpg" },
  { name: "ラバーキーホルダー黒", price: 1800, img: "12.jpg" },
  { name: "瓶入り金平糖", price: 1800, img: "13.jpg" },
  { name: "九谷焼カップ（赤）", price: 3800, img: "14.jpg" },
  { name: "九谷焼カップ（青）", price: 3800, img: "15.jpg" },
  { name: "ドキュメントケースセット", price: 2500, img: "16.jpg" },
  { name: "エコバッグ", price: 2800, img: "17.jpg" }
];

const container = document.getElementById("items");

goods.forEach((item, index) => {
  const div = document.createElement("div");
  div.className = "card";

  let sizeSelect = "";
  if (item.size) {
    sizeSelect = `
      <select>
        <option value="">サイズ選択</option>
        <option>S</option>
        <option>M</option>
        <option>L</option>
        <option>XL</option>
      </select>
    `;
  }

  div.innerHTML = `
    <img src="${item.img}" alt="${item.name}">
    <div class="name">${item.name}</div>
    <div class="price">¥${item.price}</div>
    ${sizeSelect}
    <label>
      <input type="checkbox"> 購入
    </label>
  `;

  container.appendChild(div);
});

container.addEventListener("change", calculate);

function calculate() {
  let total = 0;

  document.querySelectorAll(".card").forEach((card, index) => {
    const checkbox = card.querySelector("input[type='checkbox']");
    const select = card.querySelector("select");

    if (checkbox.checked) {
      if (select) {
        if (select.value) {
          total += goods[index].price;
        }
      } else {
        total += goods[index].price;
      }
    }
  });

  document.getElementById("total").textContent = total.toLocaleString();
}
</script>

</body>
</html>
