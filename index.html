<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ライブグッズ合計計算</title>
  <style>
    body {
      font-family: "Helvetica Neue", sans-serif;
      margin: 0;
      background: #f5f7f8;
      color: #333;
    }

    header {
      background: #7fc1c7;
      color: white;
      padding: 20px;
      text-align: center;
      font-size: 22px;
      letter-spacing: 2px;
    }

    .container {
      max-width: 1100px;
      margin: 20px auto;
      padding: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
      background: #ddd;
    }

    .name {
      font-size: 14px;
      margin: 8px 0 4px;
    }

    .price {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    input {
      width: 60px;
      padding: 4px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    .total {
      position: sticky;
      bottom: 0;
      background: white;
      padding: 15px;
      margin-top: 20px;
      font-size: 20px;
      text-align: right;
      border-top: 2px solid #eee;
    }
  </style>
</head>
<body>

<header>
  M30 OFFICIAL GOODS
</header>

<div class="container">
  <div class="grid" id="items"></div>

  <div class="total">合計: ¥<span id="total">0</span></div>
</div>

<script>
const goods = [
  { name: "Tシャツ黒（星落光）", price: 4200, img: "https://via.placeholder.com/200" },
  { name: "Tシャツ黒（星ホワイト）", price: 3800, img: "https://via.placeholder.com/200" },
  { name: "フェイスタオル", price: 2500, img: "https://via.placeholder.com/200" },
  { name: "キャップ", price: 4000, img: "https://via.placeholder.com/200" },
  { name: "Tシャツ白（星クリーム）", price: 3800, img: "https://via.placeholder.com/200" },
  { name: "Tシャツ白（星ブルーレッド）", price: 4200, img: "https://via.placeholder.com/200" },
  { name: "Tシャツ白（星ミントパープル）", price: 4200, img: "https://via.placeholder.com/200" },
  { name: "ライトパーカー", price: 7500, img: "https://via.placeholder.com/200" },
  { name: "バッグ", price: 2500, img: "https://via.placeholder.com/200" },
  { name: "サーモボトル", price: 4500, img: "https://via.placeholder.com/200" },
  { name: "ラバーキーホルダー白", price: 1800, img: "https://via.placeholder.com/200" },
  { name: "ラバーキーホルダー黒", price: 1800, img: "https://via.placeholder.com/200" },
  { name: "瓶入り金平糖", price: 1800, img: "https://via.placeholder.com/200" },
  { name: "九谷焼カップ（赤）", price: 3800, img: "https://via.placeholder.com/200" },
  { name: "九谷焼カップ（青）", price: 3800, img: "https://via.placeholder.com/200" },
  { name: "ドキュメントケースセット", price: 2500, img: "https://via.placeholder.com/200" },
  { name: "エコバッグ", price: 2800, img: "https://via.placeholder.com/200" }
];

const container = document.getElementById("items");

goods.forEach((item, index) => {
  const div = document.createElement("div");
  div.className = "card";
  div.innerHTML = `
    <img src="${item.img}" alt="${item.name}">
    <div class="name">${item.name}</div>
    <div class="price">¥${item.price}</div>
    <input type="number" min="0" value="0" data-index="${index}">
  `;
  container.appendChild(div);
});

container.addEventListener("input", calculate);

function calculate() {
  let total = 0;
  document.querySelectorAll("input").forEach(input => {
    const index = input.dataset.index;
    const quantity = parseInt(input.value) || 0;
    total += goods[index].price * quantity;
  });
  document.getElementById("total").textContent = total.toLocaleString();
}
</script>

</body>
</html>
